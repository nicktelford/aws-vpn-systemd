name: Build and Publish Packages

on:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck src/aws-vpn src/dns-up src/dns-down

  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: make deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: dist/

  build-rpm:
    name: Build RPM packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make rpm
      - uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: dist/

  build-pkg:
    name: Build Arch Linux package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make pkg
      - uses: actions/upload-artifact@v4
        with:
          name: pkg
          path: dist/

  publish:
    name: Publish packages
    needs: [lint, build-deb, build-rpm, build-pkg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          echo "value=$(awk -F'[[:space:]:=]+' '$1=="VERSION"{print $2; exit}' Makefile)" \
            >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Create release if version bumped
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists; skipping publish."
            exit 0
          fi
          PREV=$(git describe --tags --abbrev=0 --match 'v*' --exclude "$TAG" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            printf '## Changes since %s\n\n' "$PREV" > notes.md
            git log --no-merges --pretty='format:- %s' "$PREV..HEAD" -- >> notes.md
          else
            printf '## Initial release\n\n' > notes.md
            git log --no-merges --pretty='format:- %s' HEAD -- >> notes.md
          fi
          FILES=$(find packages -type f | sort)
          gh release create "$TAG" $FILES \
            --title "$TAG" \
            --notes-file notes.md \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
